
name: Kolam FHSS CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: 3.9
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
        if [ -f "backend/requirements.txt" ]; then pip install -r backend/requirements.txt; fi
        pip install pytest httpx
        
    - name: Compile C++ Kernels
      run: |
        cd backend/cpp_kernels
        g++ -shared -o kolam_kernel.so -fPIC kolam_kernel.cpp
        g++ -shared -o kolam_engine.so -fPIC -mavx2 -mfma kolam_engine.cpp
        echo "Kernels compiled successfully."

    - name: Run Unit Tests
      env:
        SECRET_KEY: "ci-test-key-123"
        DATABASE_URL: "postgresql://test_user:test_password@localhost:5432/test_db"
        ENV: "test"
      run: |
        # Run backend tests
        pytest backend/test_industry_readiness.py
        
    - name: Security Scan (Bandit)
      run: |
        pip install bandit
        bandit -r backend -ll
