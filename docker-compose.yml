version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: kolam-backend
    ports:
      - "8081:8081"
    environment:
      - ENV=production
      - DATABASE_URL=sqlite:///./kolam.db
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: kolam-frontend
    ports:
      - "8080:80" # Maps host 8080 to container Nginx port 80
    depends_on:
      - backend
    restart: always

networks:
  default:
    name: kolam-net
