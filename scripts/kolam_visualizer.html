<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolam Encryption Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .input-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .results {
            display: none;
        }
        
        .results.active {
            display: block;
        }
        
        .chunk-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chunk-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .chunk-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .chunk-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .chunk-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .chunk-text {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-family: monospace;
            font-size: 14px;
            color: #333;
        }
        
        .kolam-image-container {
            text-align: center;
            margin: 15px 0;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }
        
        .kolam-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        .kolam-info {
            margin-top: 15px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-weight: 600;
            color: #666;
        }
        
        .info-value {
            color: #333;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.5em;
            margin: 40px 0;
            display: none;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .stats-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .stat-item {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 Kolam Encryption Visualizer</h1>
            <p class="subtitle">See how each chunk gets its own unique Kolam pattern!</p>
        </header>
        
        <div class="input-section">
            <div class="input-group">
                <label for="message">📝 Your Message:</label>
                <textarea id="message" placeholder="Enter your message here...">Hello! This message uses unique Kolam patterns for encryption.</textarea>
            </div>
            
            <div class="input-group">
                <label for="seed">🔑 Master Seed (optional):</label>
                <input type="text" id="seed" placeholder="Leave empty for random">
            </div>
            
            <button onclick="encryptMessage()" id="encryptBtn">🔒 Encrypt & Visualize Kolams</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Generating unique Kolam patterns for each chunk...</div>
        </div>
        
        <div class="results" id="results">
            <div class="stats-card" id="stats"></div>
            <div class="chunk-grid" id="chunkGrid"></div>
        </div>
    </div>
    
    <script>
        async function encryptMessage() {
            const message = document.getElementById('message').value;
            const seed = document.getElementById('seed').value || null;
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const btn = document.getElementById('encryptBtn');
            
            if (!message.trim()) {
                alert('Please enter a message!');
                return;
            }
            
            // Show loading
            loading.classList.add('active');
            results.classList.remove('active');
            btn.disabled = true;
            
            try {
                const response = await fetch('http://localhost:8000/encrypt-with-kolam', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        master_seed: seed,
                        channels: 64,
                        chunk_size: 8,
                        generate_images: true
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data, message);
                } else {
                    alert('Encryption failed: ' + data.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error connecting to server. Make sure the backend is running on localhost:8000');
            } finally {
                loading.classList.remove('active');
                btn.disabled = false;
            }
        }
        
        function displayResults(data, originalMessage) {
            const results = document.getElementById('results');
            const stats = document.getElementById('stats');
            const chunkGrid = document.getElementById('chunkGrid');
            
            // Show results
            results.classList.add('active');
            
            // Display stats
            const chunks = data.encrypted_payload.chunks;
            const allSymmetries = new Set(chunks.map(c => c.p.symmetry));
            const allChannels = new Set(chunks.flatMap(c => c.c));
            
            stats.innerHTML = `
                <h2 style="margin-bottom: 20px; color: #333;">📊 Encryption Statistics</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value">${chunks.length}</div>
                        <div class="stat-label">Total Chunks</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${chunks.length}</div>
                        <div class="stat-label">Unique Kolams</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${allSymmetries.size}</div>
                        <div class="stat-label">Symmetry Types</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${allChannels.size}</div>
                        <div class="stat-label">Channels Used</div>
                    </div>
                </div>
            `;
            
            // Display chunks
            chunkGrid.innerHTML = '';
            chunks.forEach((chunk, index) => {
                const card = document.createElement('div');
                card.className = 'chunk-card';
                
                const hasImage = chunk.img && chunk.img.length > 0;
                
                card.innerHTML = `
                    <div class="chunk-header">
                        <span class="chunk-number">Chunk ${chunk.i + 1}</span>
                        <span style="color: #999; font-size: 0.9em;">${chunk.p.k}×${chunk.p.k} grid</span>
                    </div>
                    
                    <div class="chunk-text">
                        <strong>Text:</strong> "${chunk.t}"
                    </div>
                    
                    ${hasImage ? `
                        <div class="kolam-image-container">
                            <img src="data:image/png;base64,${chunk.img}" alt="Kolam Pattern ${chunk.i + 1}" class="kolam-image">
                        </div>
                    ` : '<div style="text-align: center; padding: 20px; color: #999;">No image generated</div>'}
                    
                    <div class="kolam-info">
                        <div class="info-row">
                            <span class="info-label">🎨 Pattern:</span>
                            <span class="info-value">${chunk.p.symmetry}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">📐 Grid Size:</span>
                            <span class="info-value">${chunk.p.k}×${chunk.p.k}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">🎲 Randomness:</span>
                            <span class="info-value">${chunk.p.randomness}/10</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">🔢 Seed:</span>
                            <span class="info-value">${chunk.p.seed}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">📡 Channels:</span>
                            <span class="info-value">${chunk.c.length} of 64</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">🔐 Encrypted:</span>
                            <span class="info-value">${chunk.d.length} bytes</span>
                        </div>
                    </div>
                `;
                
                chunkGrid.appendChild(card);
            });
            
            // Scroll to results
            results.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
